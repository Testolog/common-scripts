# vim:fileencoding=utf-8:foldmethod=marker
include current-theme.conf
# BEGIN_KITTY_FONTS
font_family      family='Monoid Nerd Font' postscript_name=MonoidNF-Regular
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 11.0
scrollback_lines 10000
#END_KITTY_FONTS
allow_remote_control yes
listen_on unix:@mykitty

# === Layouts (tmux-like but native) ===
enabled_layouts splits:split_axis=horizontal, stack, grid
map ctrl+alt+enter set-layout splits
map ctrl+alt+s set-layout stack
map ctrl+alt+g set-layout grid

# === Panels: navigate and create ===
map ctrl+j neighboring_window down
map ctrl+k neighboring_window up
map ctrl+h neighboring_window left
map ctrl+l neighboring_window right
map ctrl+shift+j no_op
map ctrl+shift+k no_op
map ctrl+shift+h no_op
map ctrl+shift+l no_op
map cmd+enter     launch --location=hsplit --cwd=current
map cmd+shift+enter launch --location=vsplit --cwd=current

# === Search: scrollback pager (has / and ? search) and in-screen find ===
map ctrl+shift+f show_scrollback
map ctrl+f start_search backward

# === Tab / window manager ===
map ctrl+shift+t new_tab_with_cwd current
map ctrl+shift+w close_tab
map ctrl+tab next_tab
map ctrl+shift+tab previous_tab
map ctrl+alt+tab move_tab_forward
map ctrl+alt+shift+tab move_tab_backward
map ctrl+1 goto_tab 1
map ctrl+2 goto_tab 2
map ctrl+3 goto_tab 3
map ctrl+4 goto_tab 4
map ctrl+5 goto_tab 5
map ctrl+6 goto_tab 6
map ctrl+7 goto_tab 7
map ctrl+8 goto_tab 8
map ctrl+9 goto_tab 9
map ctrl+0 goto_tab 10
map ctrl+shift+space select_tab

# Tab bar
tab_bar_style powerline
tab_bar_edge top
tab_powerline_style slanted
tab_title_template "{title}"
tab_bar_min_tabs 2
tab_bar_separator " │ "
